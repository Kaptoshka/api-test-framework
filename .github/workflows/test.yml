---
name: Tests
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
            - name: Run tests
              env:
                  BASE_URL: ${{ secrets.BASE_URL }}
                  LOG_LEVEL: info
                  TIMEOUT: 30000
              run: go test ./tests/... -v
